<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Fun - Learn Numbers 1-100</title>
    <link rel="stylesheet" href="numbers_style.css?v=2.1">
    <link rel="preconnect" href="https://pagead2.googlesyndication.com">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7451593482486400" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Top Ad Banner -->
    <div class="ad-container ad-top">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7451593482486400"
             data-ad-slot="auto"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
    <div class="container">
        <!-- Navigation Header -->
        <header class="nav-header">
            <button class="back-button" onclick="returnToHub()">← Back to Hub</button>
            <h1 class="app-title">🔢 Number Fun</h1>
            <div class="range-selector">
                <select id="rangeSelect" title="Select number range" onchange="changeRange()">
                    <option value="1-10">1-10</option>
                    <option value="11-20">11-20</option>
                    <option value="21-30">21-30</option>
                    <option value="31-40">31-40</option>
                    <option value="41-50">41-50</option>
                    <option value="51-60">51-60</option>
                    <option value="61-70">61-70</option>
                    <option value="71-80">71-80</option>
                    <option value="81-90">81-90</option>
                    <option value="91-100">91-100</option>
                </select>
            </div>
        </header>

        <!-- Progress Section -->
        <div class="progress-section">
            <div class="progress-info">
                <span class="progress-text">Progress: <span id="progressCount">0/100</span></span>
                <div class="progress-bar">
                    <div class="progress-fill" id="mainProgress"></div>
                </div>
            </div>
        </div>

        <!-- Current Number Display -->
        <div class="main-display">
            <div class="current-number" id="currentNumber">1</div>
            <div class="number-word" id="numberWord">One</div>
            <div class="visual-counter" id="visualCounter"></div>
            <div class="image-display">
                <img id="numberImage" src="" alt="Number visualization" class="hidden">
            </div>
        </div>

        <!-- Numbers Grid -->
        <div class="numbers-grid" id="numbersGrid">
            <!-- Numbers 1-10 will be populated by JavaScript -->
        </div>

        <!-- Control Buttons -->
        <div class="controls">
            <button class="control-btn" id="prevBtn" onclick="previousNumber()">⬅️ Previous</button>
            <button class="control-btn play-btn" id="playBtn" onclick="playNumberAudio()">🔊 Listen</button>
            <button class="control-btn" id="nextBtn" onclick="nextNumber()">Next ➡️</button>
            <button class="control-btn" id="random-number" onclick="randomNumber()">🎲 Surprise Me!</button>
            <button class="control-btn" id="reset-progress" onclick="resetProgress()">🔄 Start Over</button>
        </div>

        <!-- Range Navigation -->
        <div class="range-navigation">
            <button class="range-btn" onclick="changeRange('prev')">⬅️ Previous 10</button>
            <span class="range-display" id="rangeDisplay">Numbers 1-10</span>
            <button class="range-btn" onclick="changeRange('next')">Next 10 ➡️</button>
        </div>
        
        <!-- Bottom Ad Banner -->
        <div class="ad-container ad-bottom">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7451593482486400"
                 data-ad-slot="auto"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <script src="numbers_app.js"></script>
    
    <!-- Production hosting scroll optimization for Hostinger -->
    <script>
        (function() {
            'use strict';
            
            // Force smooth scrolling on production
            if (typeof CSS !== 'undefined' && CSS.supports && !CSS.supports('scroll-behavior', 'smooth')) {
                document.documentElement.style.scrollBehavior = 'smooth';
                document.body.style.scrollBehavior = 'smooth';
            }
            
            // Enhanced scroll performance for production
            let ticking = false;
            
            function updateScroll() {
                document.body.style.transform = 'translateZ(0)';
                ticking = false;
            }
            
            function requestTick() {
                if (!ticking) {
                    requestAnimationFrame(updateScroll);
                    ticking = true;
                }
            }
            
            window.addEventListener('scroll', requestTick, { passive: true });
            window.addEventListener('resize', requestTick, { passive: true });
            
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(function() {
                    document.body.style.transform = 'translateZ(0)';
                    document.body.style.webkitTransform = 'translateZ(0)';
                }, 100);
            });
        })();
    </script>
</body>
</html>
