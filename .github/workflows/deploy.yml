name: Deploy

# Runs only when commits land on main AND touch the Next.js app or rules.
# Deploys Firestore rules to Firebase, then pushes the built app to the
# nextgen repo (which Hostinger pulls from).

on:
  push:
    branches:
      - main
    paths:
      - "NextJS_APP/**"
      - ".github/workflows/deploy.yml"

# Prevent two deploys racing each other.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build → Firebase → Hostinger
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── 1. Checkout full history (needed for reliable git operations) ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node + cached deps ─────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: NextJS_APP/package-lock.json

      - name: Install dependencies
        working-directory: NextJS_APP
        run: npm ci

      # ── 3. Build static export ────────────────────────────────────────
      - name: Build
        working-directory: NextJS_APP
        run: npm run build
        env:
          NEXT_PUBLIC_FOUNDER_EMAIL: ${{ secrets.NEXT_PUBLIC_FOUNDER_EMAIL }}

      # ── 4. Deploy Firestore rules ─────────────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        working-directory: NextJS_APP
        run: firebase deploy --only firestore:rules --project kiddy-7badf
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── 5. Push built app to nextgen (Hostinger) ──────────────────────
      # We clone the nextgen repo, replace its contents with the freshly
      # built NextJS_APP/, commit, and push. This is simpler than subtree
      # push in CI and guarantees out/ is always in sync with the build.
      - name: Deploy to Hostinger via nextgen
        env:
          NEXTGEN_PAT: ${{ secrets.NEXTGEN_PAT }}
        run: |
          git config --global user.email "ci@kiddy.app"
          git config --global user.name "Kiddy CI"

          # Clone the nextgen deploy repo
          git clone \
            "https://x-access-token:${NEXTGEN_PAT}@github.com/santoshjammi/kiddy-NextGen-App.git" \
            /tmp/nextgen

          # Wipe current contents (keep .git)
          find /tmp/nextgen -mindepth 1 -maxdepth 1 -not -name ".git" -exec rm -rf {} +

          # Copy the built NextJS_APP into the nextgen root
          cp -r NextJS_APP/. /tmp/nextgen/

          cd /tmp/nextgen
          git add -A

          # Only commit if there is something new to push
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping push."
          else
            git commit -m "Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) | ${{ github.sha }}"
            git push origin main
          fi
