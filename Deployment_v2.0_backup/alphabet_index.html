<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 ABC Fun Land - Learn the Alphabet! 🎉</title>
    <link rel="stylesheet" href="alphabet_style.css?v=2.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&display=swap" rel="stylesheet"
</head>
<body>
    <!-- Loading screen -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading magical letters... ✨</div>
    </div>
    
    <!-- Main App -->
    <div id="app" class="hidden">
        <div class="container">
            <!-- Navigation Header -->
            <div class="nav-header">
                <button class="back-button" onclick="returnToHub()">← Back to Hub</button>
                <div class="header">
                    <h1 class="title">🌈 ABC Fun Land 🎉</h1>
                    <p class="subtitle">Click on letters to learn and have fun!</p>
                </div>
            </div>
            
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <!-- Alphabet Grid -->
            <div class="alphabet-grid" id="alphabet-grid">
                <!-- Letters will be generated by JavaScript -->
            </div>
            
            <!-- Main Display Area -->
            <div class="main-display" id="main-display">
                <div class="display-content">
                    <div class="current-letter" id="current-letter">?</div>
                    <div class="current-word" id="current-word">Click a letter to start!</div>
                    <img class="current-image hidden" id="current-image" src="" alt="" />
                </div>
            </div>
            
            <!-- Control Buttons -->
            <div class="controls">
                <button class="control-btn audio-control hidden" id="repeat-audio">
                    🔊 Say it Again!
                </button>
                <button class="control-btn" id="random-letter">
                    🎲 Surprise Me!
                </button>
                <button class="control-btn" id="reset-progress">
                    🔄 Start Over
                </button>
            </div>
            
            <!-- Bottom Ad Banner -->
            <div class="ad-container ad-bottom">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-7451593482486400"
                     data-ad-slot="auto"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </div>
    </div>
    
    <!-- Friendly Mascot -->
    <div class="mascot" id="mascot" title="Hi! I'm Alphabear! 🐻">🐻</div>
    
    <!-- Hidden Audio Element -->
    <audio id="audio" src="" preload="auto"></audio>
    
    <script src="alphabet_app.js"></script>
    
    <!-- Production hosting scroll optimization for Hostinger -->
    <script>
        (function() {
            'use strict';
            
            // Force smooth scrolling on production
            if (typeof CSS !== 'undefined' && CSS.supports && !CSS.supports('scroll-behavior', 'smooth')) {
                document.documentElement.style.scrollBehavior = 'smooth';
                document.body.style.scrollBehavior = 'smooth';
            }
            
            // Enhanced scroll performance for production
            let ticking = false;
            
            function updateScroll() {
                document.body.style.transform = 'translateZ(0)';
                ticking = false;
            }
            
            function requestTick() {
                if (!ticking) {
                    requestAnimationFrame(updateScroll);
                    ticking = true;
                }
            }
            
            window.addEventListener('scroll', requestTick, { passive: true });
            window.addEventListener('resize', requestTick, { passive: true });
            
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(function() {
                    document.body.style.transform = 'translateZ(0)';
                    document.body.style.webkitTransform = 'translateZ(0)';
                }, 100);
            });
        })();
    </script>
</body>
</html>
